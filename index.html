<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CRM PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#0f172a">
<link rel="icon" href="./icon-192.png">

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;margin:10px;}
button,input,select{margin:4px;padding:6px;}
table{width:100%;border-collapse:collapse;font-size:12px;}
td,th{border:1px solid #ccc;padding:5px;}
th{cursor:pointer;background:#eee;}
.hoy{outline:2px solid orange;}
.atrasado{outline:2px solid red;}
.dashboard{display:flex;gap:10px;flex-wrap:wrap;}
.card{padding:10px;background:#f0f0f0;border-radius:8px;cursor:pointer;}
</style>
</head>

<body>

<h2>CRM PRO</h2>

<button onclick="addRow()">➕ Nuevo</button>
<button onclick="guardar()">💾 Guardar</button>
<button onclick="cargar()">☁️ Recargar</button>

<input id="busquedaGlobal" placeholder="🔍 Buscar..." onkeyup="buscarGlobal()">

<div class="dashboard">
<div class="card" onclick="filtrarDashboard('Prospecto')" id="cPros"></div>
<div class="card" onclick="filtrarDashboard('Oportunidad')" id="cOpo"></div>
<div class="card" onclick="filtrarDashboard('Cliente')" id="cCli"></div>
<div class="card" onclick="filtrarDashboard('Dormido')" id="cDor"></div>
<div class="card" onclick="filtrarDashboard('hoy')" id="cHoy"></div>
<div class="card" onclick="filtrarDashboard('atrasado')" id="cAtr"></div>
</div>

<table id="tabla">
<thead>
<tr>
<th>ID</th>
<th>Cliente</th>
<th>Estado</th>
<th>Próx visita</th>
<th>🗑️</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js');
  });
}

const db=supabase.createClient(
"https://ozicgtlajuxjpyvduvvr.supabase.co",
"sb_publishable_R9aW8_6b6DcD9kQDbam-nw_ihlVv2id"
);

let calientes=[];

function selectEstado(v=""){
return `<select onchange="updateAll()">
<option value=""></option>
<option ${v=="Prospecto"?"selected":""}>Prospecto</option>
<option ${v=="Oportunidad"?"selected":""}>Oportunidad</option>
<option ${v=="Cliente"?"selected":""}>Cliente</option>
<option ${v=="Dormido"?"selected":""}>Dormido</option>
</select>`;
}

function inputFecha(v=""){
return `<input type="date" value="${v||""}" onchange="updateAll()">`;
}

function addRow(){
let r=tabla.tBodies[0].insertRow(0);
r.innerHTML=`
<td contenteditable></td>
<td contenteditable></td>
<td>${selectEstado()}</td>
<td>${inputFecha()}</td>
<td><button onclick="eliminarFila(this)">❌</button></td>`;
}

async function eliminarFila(btn){
let r=btn.parentElement.parentElement;
let id=r.cells[0].innerText;
await db.from("clientes").delete().eq("id",id);
r.remove();
}

function buscarGlobal(){
let txt=busquedaGlobal.value.toLowerCase();
document.querySelectorAll("#tabla tbody tr").forEach(r=>{
let fila=r.innerText.toLowerCase();
r.style.display=fila.includes(txt)?"":"none";
});
}

function updateAll(){
let hoy=new Date().toISOString().split("T")[0];
calientes=[];

document.querySelectorAll("#tabla tbody tr").forEach(r=>{
let f=r.cells[3].querySelector("input").value;
let estado=r.cells[2].querySelector("select").value;
let cliente=r.cells[1].innerText;

r.classList.remove("hoy","atrasado");

if(f<hoy){r.classList.add("atrasado");calientes.push(cliente);}
if(f==hoy){r.classList.add("hoy");}
if(estado=="Oportunidad") calientes.push(cliente);
});
}

function verCalientes(){
alert(calientes.join("\n")||"Sin calientes");
}

function filtrarDashboard(tipo){
document.querySelectorAll("#tabla tbody tr").forEach(r=>{
let estado=r.cells[2].querySelector("select").value;
r.style.display=(estado==tipo||tipo=="")?"":"none";
});
}

async function guardar(){
for(let r of tabla.tBodies[0].rows){
await db.from("clientes").upsert({
id:r.cells[0].innerText,
cliente:r.cells[1].innerText,
estado:r.cells[2].querySelector("select").value,
proxima:r.cells[3].querySelector("input").value
});
}
alert("Guardado OK");
}

async function cargar(){
let {data}=await db.from("clientes").select("*");
tabla.tBodies[0].innerHTML="";
data.forEach(d=>{
let r=tabla.tBodies[0].insertRow();
r.innerHTML=`
<td contenteditable>${d.id||""}</td>
<td contenteditable>${d.cliente||""}</td>
<td>${selectEstado(d.estado)}</td>
<td>${inputFecha(d.proxima)}</td>
<td><button onclick="eliminarFila(this)">❌</button></td>`;
});
updateAll();
}

window.onload=cargar;

</script>

</body>
</html>
