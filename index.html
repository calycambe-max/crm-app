<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CRM PRO APP</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">

<!-- ICONOS -->
<link rel="icon" href="icon-192.png">

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body { font-family: Arial; margin:10px; }
button,input,select{padding:6px;margin:4px;}
table{width:100%;border-collapse:collapse;font-size:12px;}
td,th{border:1px solid #ccc;padding:5px;}
th{background:#eee;cursor:pointer;}
.dashboard{display:flex;gap:10px;flex-wrap:wrap;}
.card{padding:10px;background:#f0f0f0;border-radius:8px;cursor:pointer;}
.hoy{outline:2px solid orange;}
.atrasado{outline:2px solid red;}
</style>
</head>

<body>

<h2>CRM APP</h2>

<button onclick="addRow()">➕ Nuevo</button>
<button onclick="guardar()">💾 Guardar</button>
<button onclick="cargar()">☁️ Recargar</button>

<input type="file" id="fileInput" accept=".xlsx">
<button onclick="importarExcel()">📥 Importar</button>
<button onclick="exportarExcel()">📤 Exportar</button>

<button onclick="verCalientes()">🔥 Calientes</button>

<input id="busquedaGlobal" placeholder="🔍 Buscar..." onkeyup="buscarGlobal()">

<div class="dashboard">
<div class="card" onclick="filtrarDashboard('Prospecto')" id="cPros"></div>
<div class="card" onclick="filtrarDashboard('Oportunidad')" id="cOpo"></div>
<div class="card" onclick="filtrarDashboard('Cliente')" id="cCli"></div>
<div class="card" onclick="filtrarDashboard('Dormido')" id="cDor"></div>
<div class="card" onclick="filtrarDashboard('hoy')" id="cHoy"></div>
<div class="card" onclick="filtrarDashboard('atrasado')" id="cAtr"></div>
</div>

<table id="tabla">
<thead>
<tr>
<th onclick="ordenar(event,0)">ID</th>
<th onclick="ordenar(event,1)">Cliente</th>
<th onclick="ordenar(event,2)">Contacto</th>
<th onclick="ordenar(event,3)">Teléfono</th>
<th onclick="ordenar(event,4)">Estado</th>
<th onclick="ordenar(event,5)">Tarifa</th>
<th onclick="ordenar(event,6)">Calle</th>
<th onclick="ordenar(event,7)">Población</th>
<th onclick="ordenar(event,8)">Provincia</th>
<th onclick="ordenar(event,9)">Fecha</th>
<th onclick="ordenar(event,10)">Temas</th>
<th onclick="ordenar(event,11)">Pasos</th>
<th onclick="ordenar(event,12)">Próx visita</th>
<th>🗑️</th>
</tr>
</thead>
<tbody></tbody>
</table>

<script>

// ===== SERVICE WORKER =====
if('serviceWorker' in navigator){
navigator.serviceWorker.register('sw.js');
}

// ===== SUPABASE =====
const db=supabase.createClient(
"https://ozicgtlajuxjpyvduvvr.supabase.co",
"sb_publishable_R9aW8_6b6DcD9kQDbam-nw_ihlVv2id"
);

let criteriosOrden=[],calientes=[];

// ===== COMPONENTES =====
function selectEstado(v=""){
return `<select onchange="updateAll()">
<option value=""></option>
<option ${v=="Prospecto"?"selected":""}>Prospecto</option>
<option ${v=="Oportunidad"?"selected":""}>Oportunidad</option>
<option ${v=="Cliente"?"selected":""}>Cliente</option>
<option ${v=="Dormido"?"selected":""}>Dormido</option>
</select>`;
}

function inputFecha(v=""){
return `<input type="date" value="${v||""}" onchange="updateAll()">`;
}

// ===== NUEVO =====
function addRow(){
let r=tabla.tBodies[0].insertRow(0);
r.innerHTML=`
<td contenteditable></td>
<td contenteditable></td>
<td contenteditable></td>
<td contenteditable></td>
<td>${selectEstado()}</td>
<td contenteditable></td>
<td contenteditable></td>
<td contenteditable></td>
<td contenteditable></td>
<td contenteditable></td>
<td contenteditable></td>
<td contenteditable></td>
<td>${inputFecha()}</td>
<td><button onclick="eliminarFila(this)">❌</button></td>`;
}

// ===== ELIMINAR =====
async function eliminarFila(btn){
let r=btn.parentElement.parentElement;
let id=r.cells[0].innerText;
await db.from("clientes").delete().eq("id",id);
r.remove();
}

// ===== BUSCAR =====
function buscarGlobal(){
let txt=busquedaGlobal.value.toLowerCase();
document.querySelectorAll("#tabla tbody tr").forEach(r=>{
let fila=[...r.cells].map(c=>c.innerText.toLowerCase()).join(" ");
r.style.display=fila.includes(txt)?"":"none";
});
}

// ===== ORDEN =====
function getValor(r,col){
if(col==4) return r.cells[4].querySelector("select").value;
if(col==12) return r.cells[12].querySelector("input").value;
return r.cells[col].innerText;
}

function ordenar(e,col){
if(!e.shiftKey) criteriosOrden=[];
criteriosOrden.push({col,asc:true});

let filas=[...tabla.tBodies[0].rows];
filas.sort((a,b)=>{
let A=getValor(a,col);
let B=getValor(b,col);
return A.localeCompare(B);
});
filas.forEach(f=>tabla.tBodies[0].appendChild(f));
}

// ===== IA =====
function updateAll(){
let hoy=new Date().toISOString().split("T")[0];
calientes=[];

document.querySelectorAll("#tabla tbody tr").forEach(r=>{
let f=r.cells[12].querySelector("input").value;
let estado=r.cells[4].querySelector("select").value;
let cliente=r.cells[1].innerText;

if(f<hoy || estado=="Oportunidad") calientes.push(cliente);
});
}

// ===== CALIENTES =====
function verCalientes(){
alert(calientes.join("\n")||"Sin calientes");
}

// ===== DASHBOARD =====
function filtrarDashboard(tipo){
document.querySelectorAll("#tabla tbody tr").forEach(r=>{
let estado=r.cells[4].querySelector("select").value;
r.style.display=(estado==tipo||tipo=="")?"":"none";
});
}

// ===== GUARDAR =====
async function guardar(){
for(let r of tabla.tBodies[0].rows){
await db.from("clientes").upsert({
id:r.cells[0].innerText,
cliente:r.cells[1].innerText,
estado:r.cells[4].querySelector("select").value
});
}
alert("Guardado");
}

// ===== CARGAR =====
async function cargar(){
let {data}=await db.from("clientes").select("*");
tabla.tBodies[0].innerHTML="";
data.forEach(d=>{
let r=tabla.tBodies[0].insertRow();
r.innerHTML=`
<td contenteditable>${d.id||""}</td>
<td contenteditable>${d.cliente||""}</td>
<td contenteditable></td>
<td contenteditable></td>
<td>${selectEstado(d.estado)}</td>
<td contenteditable></td>
<td contenteditable></td>
<td contenteditable></td>
<td contenteditable></td>
<td contenteditable></td>
<td contenteditable></td>
<td contenteditable></td>
<td>${inputFecha()}</td>
<td><button onclick="eliminarFila(this)">❌</button></td>`;
});
}

window.onload=cargar;

</script>

</body>
</html>
