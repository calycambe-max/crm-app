<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CRM PRO CLOUD</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#0f172a">
<link rel="icon" href="./icon-192.png">

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body{font-family:Arial;margin:10px;}
button,input,select{margin:4px;padding:6px;}
table{width:100%;border-collapse:collapse;font-size:12px;}
td,th{border:1px solid #ccc;padding:5px;}
th{background:#eee;cursor:pointer;}

.hoy{outline:2px solid orange;}
.atrasado{outline:2px solid red;}

.dashboard{display:flex;gap:10px;flex-wrap:wrap;}
.cardDash{padding:10px;background:#eee;border-radius:8px;cursor:pointer;}

#cardsContainer{display:none;}
.cardCRM{border:1px solid #ccc;border-radius:10px;padding:10px;margin:10px 0;background:#fff;}
</style>
</head>

<body>

<h2>CRM PRO CLOUD</h2>

<button onclick="addRow()">➕ Nuevo</button>
<button onclick="guardar()">💾 Guardar</button>
<button onclick="cargar()">☁️ Recargar</button>
<button onclick="resetApp()">♻️ Reset</button>

<br>

<input id="busquedaGlobal" placeholder="Buscar..." onkeyup="buscarGlobal()">
<input id="filtroCliente" placeholder="Cliente" onkeyup="filtrar()">
<input id="filtroPoblacion" placeholder="Población" onkeyup="filtrar()">

<select id="filtroEstado" onchange="filtrar()">
<option value="">Estado</option>
<option>Prospecto</option>
<option>Oportunidad</option>
<option>Cliente</option>
<option>Dormido</option>
</select>

Desde <input type="date" id="fechaDesde" onchange="filtrar()">
Hasta <input type="date" id="fechaHasta" onchange="filtrar()">

<div class="dashboard">
<div class="cardDash" onclick="filtrarDashboard('hoy')">Hoy</div>
<div class="cardDash" onclick="filtrarDashboard('atrasado')">Atrasado</div>
</div>

<table id="tabla">
<thead>
<tr>
<th>ID</th>
<th>Cliente</th>
<th>Contacto</th>
<th>Teléfono</th>
<th>Estado</th>
<th>Población</th>
<th>Fecha</th>
<th>Próx visita</th>
<th>🗑️</th>
</tr>
</thead>
<tbody></tbody>
</table>

<div id="cardsContainer"></div>

<script>

// 🔑 CONFIGURA
const supabase = window.supabase.createClient(
"TU_URL",
"TU_API_KEY"
);

// ===== NUEVO =====
function addRow(){
let r=tabla.tBodies[0].insertRow();
r.innerHTML=`
<td contenteditable></td>
<td contenteditable></td>
<td contenteditable></td>
<td contenteditable></td>
<td>
<select onchange="renderCards()">
<option></option>
<option>Prospecto</option>
<option>Oportunidad</option>
<option>Cliente</option>
<option>Dormido</option>
</select>
</td>
<td contenteditable></td>
<td><input type="date"></td>
<td><input type="date"></td>
<td><button onclick="eliminar(this)">❌</button></td>`;
renderCards();
}

// ===== GUARDAR =====
async function guardar(){
for(let r of tabla.tBodies[0].rows){
await supabase.from("clientes").upsert({
id:r.cells[0].innerText,
cliente:r.cells[1].innerText,
contacto:r.cells[2].innerText,
telefono:r.cells[3].innerText,
estado:r.cells[4].querySelector("select").value,
poblacion:r.cells[5].innerText,
fecha:r.cells[6].querySelector("input").value,
proxima:r.cells[7].querySelector("input").value
});
}
alert("Guardado en nube");
}

// ===== CARGAR =====
async function cargar(){
let {data}=await supabase.from("clientes").select("*");
tabla.tBodies[0].innerHTML="";

data.forEach(d=>{
let r=tabla.tBodies[0].insertRow();
r.innerHTML=`
<td contenteditable>${d.id}</td>
<td contenteditable>${d.cliente}</td>
<td contenteditable>${d.contacto}</td>
<td contenteditable>${d.telefono}</td>
<td>
<select onchange="renderCards()">
<option ${d.estado==""?"selected":""}></option>
<option ${d.estado=="Prospecto"?"selected":""}>Prospecto</option>
<option ${d.estado=="Oportunidad"?"selected":""}>Oportunidad</option>
<option ${d.estado=="Cliente"?"selected":""}>Cliente</option>
<option ${d.estado=="Dormido"?"selected":""}>Dormido</option>
</select>
</td>
<td contenteditable>${d.poblacion}</td>
<td><input type="date" value="${d.fecha||""}"></td>
<td><input type="date" value="${d.proxima||""}"></td>
<td><button onclick="eliminar(this)">❌</button></td>`;
});

updateEstados();
renderCards();
}

// ===== ELIMINAR =====
async function eliminar(btn){
let r=btn.parentElement.parentElement;
let id=r.cells[0].innerText;
await supabase.from("clientes").delete().eq("id",id);
r.remove();
renderCards();
}

// ===== BUSQUEDA =====
function buscarGlobal(){
let txt=busquedaGlobal.value.toLowerCase();
document.querySelectorAll("#tabla tbody tr").forEach(r=>{
r.style.display=r.innerText.toLowerCase().includes(txt)?"":"none";
});
}

// ===== FILTROS =====
function filtrar(){
let c=filtroCliente.value.toLowerCase();
let p=filtroPoblacion.value.toLowerCase();
let e=filtroEstado.value;
let d=fechaDesde.value;
let h=fechaHasta.value;

document.querySelectorAll("#tabla tbody tr").forEach(r=>{
let ok=true;

if(c && !r.cells[1].innerText.toLowerCase().includes(c)) ok=false;
if(p && !r.cells[5].innerText.toLowerCase().includes(p)) ok=false;
if(e && r.cells[4].querySelector("select").value!=e) ok=false;

let f=r.cells[6].querySelector("input").value;
if(d && f<d) ok=false;
if(h && f>h) ok=false;

r.style.display=ok?"":"none";
});
}

// ===== DASHBOARD =====
function filtrarDashboard(tipo){
let hoy=new Date().toISOString().split("T")[0];

document.querySelectorAll("#tabla tbody tr").forEach(r=>{
let f=r.cells[7].querySelector("input").value;

if(tipo=="hoy") r.style.display=(f==hoy)?"":"none";
if(tipo=="atrasado") r.style.display=(f<hoy)?"":"none";
});
}

// ===== COLORES =====
function updateEstados(){
let hoy=new Date().toISOString().split("T")[0];

document.querySelectorAll("#tabla tbody tr").forEach(r=>{
let f=r.cells[7].querySelector("input").value;

r.classList.remove("hoy","atrasado");

if(f==hoy) r.classList.add("hoy");
if(f<hoy) r.classList.add("atrasado");
});
}

// ===== MOBILE =====
function renderCards(){
let cont=cardsContainer;
cont.innerHTML="";

document.querySelectorAll("#tabla tbody tr").forEach((r,i)=>{
let card=document.createElement("div");
card.className="cardCRM";

card.innerHTML=`
<b>${r.cells[1].innerText}</b><br>
${r.cells[2].innerText}<br>
${r.cells[3].innerText}<br>
Estado: ${r.cells[4].querySelector("select").value}<br>
Visita: ${r.cells[7].querySelector("input").value}<br>
<button onclick="scrollToRow(${i})">Editar</button>
`;

cont.appendChild(card);
});
}

function scrollToRow(i){
document.querySelectorAll("#tabla tbody tr")[i].scrollIntoView({behavior:"smooth"});
}

function checkMobile(){
if(window.innerWidth<768){
tabla.style.display="none";
cardsContainer.style.display="block";
renderCards();
}else{
tabla.style.display="table";
cardsContainer.style.display="none";
}
}

window.addEventListener("resize",checkMobile);

// ===== RESET =====
async function resetApp(){
if(!confirm("Reset app?")) return;

if('caches' in window){
let keys=await caches.keys();
await Promise.all(keys.map(k=>caches.delete(k)));
}

if('serviceWorker' in navigator){
let regs=await navigator.serviceWorker.getRegistrations();
for(let r of regs) await r.unregister();
}

localStorage.clear();
location.reload(true);
}

// ===== INIT =====
window.onload=()=>{
cargar();
checkMobile();
};

// ===== SW =====
if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('./sw.js');
}

</script>

</body>
</html>
